<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="/images/icon.png">
  <title>Piturnah.xyz | Music</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/blog.css">
  <link rel="stylesheet" href="/css/sotw.css">

  <link rel="alternate" type="application/atom+xml" href="/atom.xml"> <!-- TODO: atom -->

</head>

<body>
  <script>
      function gotoSong() {
          window.open("$listenUrl$", '_blank').focus();
      }
  </script>

  $partial("_templates/nav.html")$

  <div class="main-content">
    <div id="sotw">
      <div id="sotw-header" class="flex-row">
        <div id="sotw-album" onclick="gotoSong()">
          <div id="sotw-shadow"></div>
          <div id="sotw-disc">
            <div id="sotw-disc-shadow"></div>
            <div id="sotw-disc-inner">
              <div id="sotw-disc-label" style="background-image: url($coverSm$)">
                <div id="sotw-disc-hole"></div>
                <span id="sotw-disc-title"></span>
              </div>
            </div>
          </div>
          <div id="sotw-case" style="background-image: url($coverLg$)">
          </div>
        </div>
        <div id="sotw-titles" class="flex-col" style="width:100%; justify-content:space-between">
          <div>
              <h1>Song of the Week</h1>
              <h2 id="sotw-date">($published$)</h2>
          </div>
          <div class="flex-row" style="justify-content:space-between;">
            <div>
              <h2>$song$</h2>
              <h3 id="sotw-date">by $artist$</h3>
            </div>
            
          </div>
        </div>
      </div>
      <div class="box">
          $body$
      </div>
    </div>
  </div>
</body>
</html>
