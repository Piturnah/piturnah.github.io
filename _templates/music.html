<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="/images/icon.png">
  <title>Piturnah.xyz | Music</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/blog.css">
  <link rel="stylesheet" href="/css/sotw.css">

  <link rel="alternate" type="application/atom+xml" href="/atom.xml"> <!-- TODO: atom -->

</head>

<body>
  $partial("_templates/nav.html")$

  <div class="main-content">
    $partial("_templates/sotw_partial.html")$

    <div style="margin-top:0.5em;">
      <h1 style="display:inline;">Archive</h1>
      <a href="" style="margin-left:0.5em;">
        <img width="20" height="20" src="/assets/rss.svg" alt="RSS logo" />
      </a>
    </div>
    <div id="sotw-playlist" class="box flex-col" style="margin-bottom:0.5em;">
      $for(posts)$
         <a href="$url$" class="playlist-item flex-row">
           <div class="playlist-item-info flex-row">
             <img src="$coverSm$" width="70px" height="70px" />
             <div class="flex-col" style="margin-left:1em">
               <div class="song-title">$song$</div>
               <div>$artist$</div>
             </div>
           </div>
           $published$
         </a>
      $endfor$
    </div>
    <div style="text-align:end;display:block;">
      <a href="https://www.last.fm/user/Piturnah/playlists/14531629">last.fm playlist</a>
    </div>
  </div>
</body>
</html>
